<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LyricFlow - Playlist Lirik Otomatis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="bg-video" class="bg-video" autoplay muted loop playsinline></video>
  <div id="scene-layer" class="scene-layer" aria-hidden="true"></div>
  <div class="bg-overlay"></div>
  <canvas id="particles" class="particles" aria-hidden="true"></canvas>
  <div class="orbs" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <main class="app">
    <header class="topbar">
      <div>
        <div class="app-brand">
          <div class="app-title">LyricFlow</div>
          <div class="app-credit">By Dimas A.P</div>
        </div>
        <div class="app-subtitle">Auto lirik dengan playlist & efek visual</div>
      </div>
      <div class="topbar-actions">
        <label class="chip">
          <input id="toggle-orbs" type="checkbox" checked />
          Efek Glow
        </label>
        <label class="chip">
          <input id="toggle-motion" type="checkbox" checked />
          Animasi
        </label>
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <div class="card">
          <div class="card-title">Kontrol</div>
          <div class="controls">
            <button id="prev" class="btn">Prev</button>
            <button id="rewind" class="btn">-5s</button>
            <button id="play" class="btn primary">Play</button>
            <button id="forward" class="btn">+5s</button>
            <button id="next" class="btn">Next</button>
          </div>
          <div class="seek">
            <span id="time-current">0:00</span>
            <input id="seek" type="range" min="0" max="100" value="0" />
            <span id="time-total">0:00</span>
          </div>
          <canvas id="waveform" class="waveform" aria-hidden="true"></canvas>
          <div class="controls-row">
            <label class="switch">
              <input id="loop" type="checkbox" />
              <span>Repeat</span>
            </label>
            <label class="switch">
              <input id="autonext" type="checkbox" checked />
              <span>Auto Next</span>
            </label>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Sleep Timer</div>
          <div class="settings">
            <div class="timer-row">
              <select id="sleep-minutes" class="select-input">
                <option value="0">Off</option>
                <option value="15">15 menit</option>
                <option value="30">30 menit</option>
                <option value="60">60 menit</option>
              </select>
              <button id="sleep-apply" class="btn">Set</button>
              <button id="sleep-cancel" class="btn">Clear</button>
            </div>
            <div id="sleep-status" class="meta-status">Timer off</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Playlist</div>
          <ul id="playlist" class="playlist"></ul>
        </div>
      </aside>

      <section class="lyrics">
        <div id="stage-state" class="stage-state" aria-hidden="true">
          <div id="stage-state-badge" class="stage-state-badge"></div>
          <div id="stage-state-title" class="stage-state-title"></div>
          <div id="stage-state-subtitle" class="stage-state-subtitle"></div>
        </div>
        <div class="lyrics-header">
          <div>
            <div id="track-title" class="track-title">-</div>
            <div id="track-artist" class="track-artist">-</div>
          </div>
          <div class="lyrics-tools">
            <div id="playback-status" class="playback-status" data-state="idle"></div>
            <div class="shortcut-hint">Space, Arrows</div>
          </div>
        </div>
        <div id="lyrics-list" class="lyrics-list"></div>
      </section>
    </section>
  </main>

  <audio id="audio" preload="metadata" crossorigin="anonymous"></audio>

  <script src="lyrics/1.js"></script>
  <script src="lyrics/2.js"></script>
  <script src="lyrics/3.js"></script>
  <script src="lyrics/4.js"></script>
  <script src="lyrics/5.js"></script>
  <script src="lyrics/6.js"></script>
  <script src="lyrics/7.js"></script>
  <script src="lyrics/8.js"></script>
  <script src="lyrics/9.js"></script>
  <script src="lyrics/10.js"></script>
  <script src="app.js"></script>
</body>
</html>
